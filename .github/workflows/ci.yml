name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Create virtual env + install dependencies
        run: |
          uv venv
          uv pip install -e "core"
          uv pip install -e "sdk" --no-deps
          uv pip install pytest pytest-asyncio httpx
      
      - name: Run core tests
        run: uv run pytest tests/core/ -v --tb=short
      
      - name: Run fuzz tests
        run: uv run pytest tests/fuzz/ -v --tb=short
      
      - name: Run benchmarks (quick smoke)
        run: uv run python benchmarks/run.py --iterations 10 --no-pipeline
      
      - name: Verify all plugins import
        run: uv run python .github/scripts/verify_plugins.py