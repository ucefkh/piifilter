name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual env + install dependencies
        run: |
          uv venv
          uv pip install -e "core"
          uv pip install -e "sdk" --no-deps
          uv pip install pytest pytest-asyncio httpx httpx-sse

      - name: Run core tests
        run: uv run pytest tests/core/ -v --tb=short

      - name: Run fuzz tests
        run: uv run pytest tests/fuzz/ -v --tb=short

      - name: Run recall benchmark
        run: uv run python benchmarks/recall.py --detectors regex
        # Produces benchmarks/recall-results.json for the gate below

      - name: Recall regression gate (>= 0.80)
        run: uv run python .github/scripts/check_recall_floor.py
        # Fails build if any entity type recall < 0.80 in benchmarks/recall-results.json
        # TODO: ratchet to 0.95 as coverage improves

      - name: Record current recall as badge
        id: recall-badge
        run: |
          if [ -f benchmarks/recall-results.json ]; then
            RECALL=$(python3 -c '
import json, sys
with open("benchmarks/recall-results.json") as f:
    d = json.load(f)
recalls = []
for det, dd in d.get("detectors", {}).items():
    for typ, mm in dd.get("per_type", {}).items():
        r = mm.get("recall", 0)
        recalls.append(r)
if recalls:
    worst = min(recalls)
    print(f"{worst:.4f}")
else:
    print("0.0")
')
            echo "recall=$RECALL" >> "$GITHUB_OUTPUT"
            echo "Current minimum recall: $RECALL (target: 0.80)"
          else
            echo "No recall results file found"
            echo "recall=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify all plugins import
        run: uv run python .github/scripts/verify_plugins.py

  live-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual env + install dependencies
        run: |
          uv venv
          uv pip install -e "core"
          uv pip install -e "sdk" --no-deps
          uv pip install -e "plugins/provider-lmstudio"
          uv pip install -e "plugins/provider-ollama"
          uv pip install pytest pytest-asyncio httpx httpx-sse

      - name: Start Ollama (pre-built binary)
        run: |
          if ! command -v ollama &>/dev/null; then
            curl -fsSLo /tmp/ollama.tgz "https://github.com/ollama/ollama/releases/latest/download/ollama-linux-amd64.tgz"
            tar -C /usr/local -xzf /tmp/ollama.tgz
          fi
          ollama serve &
          sleep 8
          for i in $(seq 1 5); do curl -sf http://localhost:11434/api/tags > /dev/null && echo "Ollama ready" && break; sleep 2; done

      - name: Pull CI test model (mistral)
        run: |
          if ! curl -s http://localhost:11434/api/tags | grep -q "mistral"; then
            ollama pull mistral 2>&1 | tail -3
          fi
          echo "Model ready"

      - name: Verify /v1/models endpoint
        run: |
          echo "Available models:"
          curl -s http://localhost:11434/v1/models | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print('\n'.join(m['id'] for m in d.get('data',[])))"

      - name: Run live provider integration tests
        env:
          PIIFILTER_LIVE_TESTS: "1"
          PIIFILTER_LIVE_TIMEOUT: "180"
        run: |
          uv run pytest tests/integration/test_provider_real.py -v --tb=short -x -k "provider_auto_detect or provider_forward_real or provider_health_check" --timeout=200