name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual env + install dependencies
        run: |
          uv venv
          uv pip install -e "core"
          uv pip install -e "sdk" --no-deps
          uv pip install pytest pytest-asyncio httpx httpx-sse

      - name: Run core tests
        run: uv run pytest tests/core/ -v --tb=short

      - name: Run fuzz tests
        run: uv run pytest tests/fuzz/ -v --tb=short

      - name: Run benchmarks (quick smoke)
        run: uv run python benchmarks/run.py --iterations 10 --no-pipeline

      - name: Verify all plugins import
        run: uv run python .github/scripts/verify_plugins.py

  live-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual env + install dependencies
        run: |
          uv venv
          uv pip install -e "core"
          uv pip install -e "sdk" --no-deps
          uv pip install -e "plugins/provider-lmstudio"
          uv pip install pytest pytest-asyncio httpx httpx-sse

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 4
          curl -sf http://localhost:11434/api/tags > /dev/null && echo "Ollama ready" || { echo "Ollama not started"; exit 1; }

      - name: Pull CI test model (mistral)
        run: |
          if ! curl -s http://localhost:11434/api/tags | grep -q "mistral"; then
            ollama pull mistral 2>&1 | tail -3
          fi
          echo "Model ready"

      - name: Verify /v1/models endpoint
        run: |
          echo "Available models:"
          curl -s http://localhost:11434/v1/models | python3 -c \
            "import json,sys; d=json.load(sys.stdin); print('\n'.join(m['id'] for m in d.get('data',[])))"

      - name: Run live provider integration tests
        env:
          PIIFILTER_LIVE_TESTS: "1"
          PIIFILTER_LIVE_TIMEOUT: "180"
        run: |
          uv run pytest tests/integration/test_provider_real.py -v --tb=short -x --timeout=200