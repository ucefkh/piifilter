# PIIFilter v2 Configuration
config_version: 2
schema_version: 1

provider:
  name: lmstudio
  endpoint: "http://localhost:1234/v1"
  api_key: ""
  default_model: "gpt-3.5-turbo"

policy:
  rules:
    - if:
        type: API_KEY
      action: BLOCK
    - if:
        type: JWT
      action: BLOCK
    - if:
        type: SSH_KEY
      action: BLOCK
    - if:
        type: CREDIT_CARD
      action: BLOCK
    - if:
        type: SOCIAL_SECURITY
      action: BLOCK
    - if:
        risk: 80
        operator: ">"
      action: BLOCK

detection:
  enabled_detectors: [regex, presidio]
  confidence_threshold: 0.5
  min_votes: 1

replacement:
  default_strategy: semantic
  seed: "deterministic"

logging:
  level: INFO
  audit_enabled: true